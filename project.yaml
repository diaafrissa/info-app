services: 
    mongodb:
      image: mongo
      ports:
      - 27017:27017
      environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=diaa
      healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"] 
        interval: 4s
        timeout: 6s
        retries: 5
        start_period: 5s
      volumes: 
      - mongo-db:/data/db
    info-app:
      image: info-app:1.2
      restart: always
      ports:
      - 3000:3000
      depends_on:
      - mongo-express
    mongo-express:
      restart: always
      image: mongo-express
      ports:
      - 8081:8081
      environment:
      - ME_CONFIG_BASICAUTH_USERNAME=diaa
      - ME_CONFIG_BASICAUTH_PASSWORD=diaa     
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=diaa
      - ME_CONFIG_MONGODB_SERVER=mongodb
      depends_on:
        mongodb:
         condition: 'service_healthy'
volumes:
 mongo-db:
   driver: local        